<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>010011</title>
    <meta name="description" content="Personal website — writing, photos, music, and notes." />

    <link rel="stylesheet" href="styles.css?v=18" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="outer-frame">
      <header class="top-bar">
        <nav class="nav" aria-label="Primary">
          <button class="nav-btn" data-page="about" type="button">About Me</button>
          <button class="nav-btn" data-page="photos" type="button">Photos</button>
          <button class="nav-btn" data-page="music" type="button">Music</button>
          <!-- Blog is dormant until content is ready:
          <button class="nav-btn" data-page="blog" type="button">Blog</button>
          -->
          <button class="nav-btn" data-page="library" type="button">Library</button>
        </nav>
      </header>

      <main class="center-wrap">
        <section class="inner-frame" aria-label="Content frame">
          <div id="content" class="content" role="region" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <!-- Content templates -->
    <template id="tpl-about">
      <img class="about-photo" src="photos/me.jpg" alt="A photo of me" />
      <h1>About Me</h1>

      <p>Hi! It's Nico :)</p>

      <p>Welcome to my cybercorner.</p>

      <p>I'm an entrepreneur. A professional <a href="https://substackcdn.com/image/fetch/$s_!--9l!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Faf990b8d-c9a9-4c82-93c4-589141016819_1050x1038.png" target="_blank" rel="noopener">FAFO</a>er and <a href="https://en.wiktionary.org/wiki/FITFO" target="_blank" rel="noopener">FITFO</a>er. A cyberpunk.</p>

      <p>I enjoy nature, learning, music, art, creating and fotosynthesis.</p>

      <p>
        A fun fact about me is that I'm a trained carpenter, so I can call myself a builder in the
        full sense of the word.
      </p>

      <p>
        This website is an archive and a creative expression in a world where timelines and profiles
        are cookie-cutter platforms.
      </p>

      <p>Thanks for visiting and reading. Mi casa es tu casa ;)</p>

      <hr class="ack-divider" />
      <p class="ack-link">
        <a href="#acknowledgements" data-page="acknowledgements">Acknowledgements</a>
      </p>
    </template>

    <template id="tpl-acknowledgements">
      <h1>Acknowledgements</h1>
      <p>
        It's odd to have acknowledgements on a personal website, but I think being thankful feels
        good. Especially to those who have shown incredible support to me as a human.
      </p>
      <p>To:</p>
      <p>
        Helen - Santi - Felix - Nike - Doris - Pau - Tony - Esteban - Sebas - Sean - Matt - Keith -
        and many many more humans that have reminded me of my worth &lt;3
      </p>
    </template>

    <template id="tpl-photos">
      <h1>Photos</h1>
      <p>Film, digital, and whatever's in between.</p>
      <div id="photo-filters" class="photo-filters" role="group" aria-label="Filter by tag">
        <!-- JS renders filter buttons here -->
      </div>
      <div id="photo-mosaic" class="photo-mosaic" aria-label="Photo gallery">
        <!-- JS renders photos here -->
      </div>
    </template>

    <template id="tpl-music">
      <h1>Music</h1>

      <div class="section-tabs" role="tablist">
        <button class="tab-btn is-active" data-tab="songs" type="button">Songs</button>
        <button class="tab-btn" data-tab="sets" type="button">Sets</button>
      </div>

      <div class="tab-pane" id="tab-songs">
        <section class="music-list" id="music-songs-list">
          <!-- JS renders items here -->
        </section>
      </div>

      <div class="tab-pane" id="tab-sets" hidden>
        <section class="music-list" id="music-sets-list">
          <!-- JS renders items here -->
        </section>
      </div>

    </template>

    <template id="tpl-library">
      <h1>Library</h1>
      <p class="library-legend">
        solid = read &nbsp;·&nbsp; dashed = wishlist &nbsp;·&nbsp; double = reading
      </p>
      <div id="bookshelf" class="bookshelf-room">
        <!-- JS renders shelves here -->
      </div>
    </template>

    <!-- UPDATED BLOG TEMPLATE -->
    <template id="tpl-blog">
      <div class="blog-head">
        <h1 class="blog-title">Blog</h1>

        <div class="blog-toolbar">
          <label class="blog-sort">
            <span>Sort</span>
            <select id="blog-sort" class="blog-sort-select">
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
              <option value="title">Title</option>
            </select>
          </label>
        </div>
      </div>

      <div id="blog-list" class="blog-list" aria-label="Blog posts list">
        <!-- JS renders timeline cards here -->
      </div>
    </template>

    <script src="app.js?v=8"></script>
  </body>
</html>
